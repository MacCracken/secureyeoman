name: secureyeoman

services:
  # External PostgreSQL — optional. By default, sy-core/secureyeoman use embedded PG.
  # To use this external PG instead, run with --profile external-db and set
  # DATABASE_HOST=sy-pg in the service environment.
  sy-pg:
    # PRODUCTION: Pin to SHA256 digest in .env — e.g. PGVECTOR_IMAGE=pgvector/pgvector@sha256:<digest>
    # Get digest: docker manifest inspect pgvector/pgvector:pg16 | jq -r '.manifests[0].digest'
    image: ${PGVECTOR_IMAGE:-pgvector/pgvector:pg16}
    environment:
      POSTGRES_DB: secureyeoman
      POSTGRES_USER: secureyeoman
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secureyeoman_dev}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: '512m'
    command: >-
      postgres
      -c shared_buffers=512MB
      -c work_mem=32MB
      -c maintenance_work_mem=256MB
      -c effective_cache_size=2GB
      -c wal_buffers=16MB
      -c max_wal_size=2GB
      -c checkpoint_completion_target=0.9
      -c synchronous_commit=off
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_parallel_workers_per_gather=4
      -c max_parallel_workers=8
      -c max_worker_processes=12
      -c log_min_duration_statement=500
      -c log_checkpoints=on
      -c max_connections=200
      -c jit=off
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U secureyeoman']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    profiles:
      - external-db
    restart: unless-stopped

  sy-core:
    build:
      context: .
      dockerfile: Dockerfile.dev
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '18789:18789'
      - '${TLS_PORT:-443}:${TLS_PORT:-443}'
    volumes:
      - data:/home/secureyeoman/.secureyeoman
      - sy-pgdata:/var/lib/postgresql/data
      - community-repo:/usr/share/secureyeoman/community-repo
      - ./certs:/app/certs:ro
    env_file: .env.dev
    environment:
      SECUREYEOMAN_HOST: '0.0.0.0'
      NODE_ENV: production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secureyeoman_dev}
      # DATABASE_HOST is unset by default → embedded PostgreSQL.
      # Set DATABASE_HOST=sy-pg and use --profile external-db for external PG.
      DATABASE_HOST: ${DATABASE_HOST:-}
      DATABASE_USER: secureyeoman
      DATABASE_NAME: secureyeoman
      # Unified TLS env vars (Caddy reverse proxy). Loaded from env_file (.env.dev).
      # Set TLS_ENABLED=true + TLS_CERT_PATH/TLS_KEY_PATH for provided certs,
      # or TLS_ENABLED=true + TLS_DOMAIN for auto ACME.
      # OAuth credentials loaded from env_file (.env.dev) — do not re-declare here
      # as ${VAR:-} resolves against the host shell and overrides env_file values.
      # OPA sidecar for Rego policy evaluation (Phase 50).
      # Unset to disable OPA; core falls back to natural-language rule matching.
      OPA_ADDR: ${OPA_ADDR:-}
      # AGNOS integration — runs in-container (baked into agnosticos base image).
      AGNOS_GATEWAY_URL: ${AGNOS_GATEWAY_URL:-http://127.0.0.1:8088}
      AGNOS_RUNTIME_URL: ${AGNOS_RUNTIME_URL:-http://127.0.0.1:8090}
      AGNOS_GATEWAY_API_KEY: ${AGNOS_GATEWAY_API_KEY:-}
      AGNOS_RUNTIME_API_KEY: ${AGNOS_RUNTIME_API_KEY:-}
      # AGNOSTIC QA integration — points to agnostic service when --profile agnostic is active.
      AGNOSTIC_URL: ${AGNOSTIC_URL:-http://agnostic:8000}
      AGNOSTIC_API_KEY: ${AGNOSTIC_API_KEY:-}
      # Photisnadi task/ritual integration
      PHOTISNADI_SUPABASE_URL: ${PHOTISNADI_SUPABASE_URL:-}
      PHOTISNADI_SUPABASE_KEY: ${PHOTISNADI_SUPABASE_KEY:-}
      PHOTISNADI_USER_ID: ${PHOTISNADI_USER_ID:-}
      # Synapse LLM controller — training delegation and model management
      SYNAPSE_API_URL: ${SYNAPSE_API_URL:-http://synapse:8420}
      SYNAPSE_GRPC_URL: ${SYNAPSE_GRPC_URL:-http://synapse:8421}
      # Shruti DAW — points to shruti/shruti-dev service on Docker network
      SHRUTI_URL: ${SHRUTI_URL:-http://shruti:8050}
      # Rasa Image Editor
      RASA_URL: ${RASA_URL:-http://rasa:8080}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'NODE_TLS_REJECT_UNAUTHORIZED=0 node /app/packages/core/dist/cli.js health --url https://127.0.0.1:18789 --json 2>/dev/null || node /app/packages/core/dist/cli.js health --url http://127.0.0.1:18789 --json',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    profiles:
      - dev
      - full-dev
    restart: unless-stopped

  # MCP service uses the 'mcp-server' subcommand of the core binary/node process
  sy-mcp:
    build:
      context: .
      dockerfile: Dockerfile.dev
    # MCP sidecar doesn't need AGNOS — skip the combined entrypoint.
    entrypoint: ['node', '/app/packages/core/dist/cli.js']
    command: ['mcp-server']
    ports:
      - '3001:3001'
    volumes:
      - data:/home/secureyeoman/.secureyeoman
    env_file: .env.dev
    environment:
      MCP_ENABLED: '${MCP_ENABLED:-true}'
      MCP_PORT: '3001'
      MCP_HOST: '0.0.0.0'
      MCP_TRANSPORT: '${MCP_TRANSPORT:-streamable-http}'
      MCP_AUTO_REGISTER: '${MCP_AUTO_REGISTER:-true}'
      # MCP_CORE_URL set via env_file (.env.dev) — defaults to http, override to https when TLS enabled
      MCP_ADVERTISE_URL: 'http://sy-mcp:3001'
      MCP_EXPOSE_FILESYSTEM: '${MCP_EXPOSE_FILESYSTEM:-false}'
      MCP_ALLOWED_PATHS: '${MCP_ALLOWED_PATHS:-}'
      MCP_RATE_LIMIT_PER_TOOL: '${MCP_RATE_LIMIT_PER_TOOL:-30}'
      MCP_LOG_LEVEL: '${MCP_LOG_LEVEL:-info}'
      # Agnostic / AGNOS tool flags and URLs are loaded from env_file (.env.dev).
      # Do NOT re-declare them here — environment: overrides env_file values,
      # and the ${VAR:-default} pattern would replace .env.dev's true with false.
      AGNOSTIC_URL: ${AGNOSTIC_URL:-http://agnostic:8000}
      # Dev: points to sy-core. Prod: override to http://secureyeoman:8088 via env.
      AGNOS_GATEWAY_URL: ${AGNOS_GATEWAY_URL:-http://sy-core:8088}
      AGNOS_RUNTIME_URL: ${AGNOS_RUNTIME_URL:-http://sy-core:8090}
      # BullShift trading API — points to bullshift service in dev profile
      BULLSHIFT_API_URL: ${BULLSHIFT_API_URL:-http://bullshift:8787}
      # Synapse LLM controller
      SYNAPSE_API_URL: ${SYNAPSE_API_URL:-http://synapse:8420}
      SYNAPSE_GRPC_URL: ${SYNAPSE_GRPC_URL:-http://synapse:8421}
      # Delta code forge — discovered via MCP env vars (DELTA_URL, MCP_EXPOSE_DELTA_TOOLS)
      DELTA_URL: ${DELTA_URL:-http://delta:8070}
      DELTA_API_TOKEN: ${DELTA_API_TOKEN:-}
      NODE_ENV: production
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3001/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      sy-core:
        condition: service_healthy
        required: false
      secureyeoman:
        condition: service_healthy
        required: false
    profiles:
      - mcp
      - full
      - full-dev
      - dev
      - prod
    restart: unless-stopped

  # --- Production services (--profile prod) ---
  # Uses binary-based Dockerfile (requires: npm run build:binary first).
  # Dashboard is served by core via @fastify/static — no separate dashboard service.

  secureyeoman:
    build:
      context: .
      dockerfile: Dockerfile
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '18789:18789'
      - '${TLS_PORT:-443}:${TLS_PORT:-443}'
    volumes:
      - data:/home/secureyeoman/.secureyeoman
      - sy-pgdata:/var/lib/postgresql/data
      - community-repo:/usr/share/secureyeoman/community-repo
      - ./certs:/app/certs:ro
    env_file: .env.dev
    environment:
      SECUREYEOMAN_HOST: '0.0.0.0'
      NODE_ENV: production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secureyeoman_dev}
      # DATABASE_HOST is unset by default → embedded PostgreSQL.
      # Set DATABASE_HOST=sy-pg and use --profile external-db for external PG.
      DATABASE_HOST: ${DATABASE_HOST:-}
      DATABASE_USER: secureyeoman
      DATABASE_NAME: secureyeoman
      OPA_ADDR: ${OPA_ADDR:-}
      AGNOS_GATEWAY_URL: ${AGNOS_GATEWAY_URL:-http://127.0.0.1:8088}
      AGNOS_RUNTIME_URL: ${AGNOS_RUNTIME_URL:-http://127.0.0.1:8090}
      AGNOS_GATEWAY_API_KEY: ${AGNOS_GATEWAY_API_KEY:-}
      AGNOS_RUNTIME_API_KEY: ${AGNOS_RUNTIME_API_KEY:-}
      AGNOSTIC_URL: ${AGNOSTIC_URL:-http://agnostic:8000}
      AGNOSTIC_API_KEY: ${AGNOSTIC_API_KEY:-}
      # Photisnadi task/ritual integration
      PHOTISNADI_SUPABASE_URL: ${PHOTISNADI_SUPABASE_URL:-}
      PHOTISNADI_SUPABASE_KEY: ${PHOTISNADI_SUPABASE_KEY:-}
      PHOTISNADI_USER_ID: ${PHOTISNADI_USER_ID:-}
      # Synapse LLM controller
      SYNAPSE_API_URL: ${SYNAPSE_API_URL:-http://synapse:8420}
      SYNAPSE_GRPC_URL: ${SYNAPSE_GRPC_URL:-http://synapse:8421}
    healthcheck:
      test: ['CMD', 'secureyeoman', 'health', '--json']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    profiles:
      - prod
    restart: unless-stopped

  # ── Agent runtime (Tier 2.5) ────────────────────────────────────────────────
  # Headless agent with soul, AI, A2A — no brain/training/dashboard.
  # Registers with the parent SY instance for auth, knowledge, and audit delegation.
  # Scale with: docker compose --profile agent up --scale sy-agent=3
  sy-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - '${AGENT_PORT:-8099}:8099'
    environment:
      SECUREYEOMAN_HOST: '0.0.0.0'
      SECUREYEOMAN_PARENT_URL: ${SECUREYEOMAN_PARENT_URL:-http://sy-core:18789}
      SECUREYEOMAN_AGENT_TOKEN: ${SECUREYEOMAN_AGENT_TOKEN:-}
      SECUREYEOMAN_AGENT_TAGS: ${SECUREYEOMAN_AGENT_TAGS:-}
      SECUREYEOMAN_LOG_FORMAT: json
      # AI provider config — agent needs its own provider credentials
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://127.0.0.1:8099/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      sy-core:
        condition: service_healthy
        required: false
      secureyeoman:
        condition: service_healthy
        required: false
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
    profiles:
      - agent
      - full
      - full-dev
    restart: unless-stopped

  # AGNOSTIC QA Platform — Chainlit webgui + agent workers.
  # Requires Redis for task queue and session state.
  agnostic:
    image: ghcr.io/maccracken/agnostic:latest
    ports:
      - '8000:8000'
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AGNOSTIC_API_KEY: ${AGNOSTIC_API_KEY:-}
      YEOMAN_A2A_ENABLED: '${YEOMAN_A2A_ENABLED:-true}'
      MCP_SERVER_ENABLED: '${MCP_SERVER_ENABLED:-true}'
      WEBGUI_HOST: '0.0.0.0'
      WEBGUI_PORT: '8000'
      CREDENTIAL_PROVISIONING_ENABLED: '${CREDENTIAL_PROVISIONING_ENABLED:-true}'
      REDIS_HOST: agnostic-redis
      REDIS_PORT: '6379'
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    depends_on:
      agnostic-redis:
        condition: service_healthy
        required: false
    profiles:
      - agnostic
      - full-dev
    restart: unless-stopped

  # Redis for AGNOSTIC task queue and session state.
  # TEMPORARY: Next agnostic release embeds Redis internally — remove this service then.
  # Only in full-dev; standalone agnostic can use its own or embedded Redis.
  agnostic-redis:
    # PRODUCTION: Pin to SHA256 digest in .env — e.g. REDIS_IMAGE=redis@sha256:<digest>
    # Get digest: docker manifest inspect redis:7-alpine | jq -r '.manifests[0].digest'
    image: ${REDIS_IMAGE:-redis:7-alpine}
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    profiles:
      - full-dev
    restart: unless-stopped

  # AGNOS (agnosticos) — standalone AI-Native General Operating System container.
  # Provides LLM Gateway (port 8088) and Agent Runtime (port 8090) as a separate service.
  # Core already has AGNOS baked in; this is for full integration testing.
  agnosticos:
    image: ghcr.io/maccracken/agnosticos:latest
    ports:
      - '8088:8088'
      - '8090:8090'
    environment:
      AGNOS_LOG_FORMAT: '${AGNOS_LOG_FORMAT:-json}'
      RUST_LOG: '${RUST_LOG:-info}'
      AGNOS_RUNTIME_BIND: '0.0.0.0'
      AGNOS_GATEWAY_BIND: '0.0.0.0'
      AGNOS_RUNTIME_API_KEY: '${AGNOS_RUNTIME_API_KEY:-}'
      AGNOS_GATEWAY_API_KEY: '${AGNOS_GATEWAY_API_KEY:-}'
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8088/v1/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - agnos
      - full
      - full-dev
    restart: unless-stopped

  # OPA sidecar — used by IntentManager for Rego policy evaluation (Phase 50).
  # Capabilities are restricted to block SSRF: http.send and net.lookup_ip_addr
  # are disabled before accepting user-authored Rego policies.
  sy-opa:
    # PRODUCTION: Pin to SHA256 digest in .env — e.g. OPA_IMAGE=openpolicyagent/opa@sha256:<digest>
    # Get digest: docker manifest inspect openpolicyagent/opa:1.14.0 | jq -r '.manifests[0].digest'
    image: ${OPA_IMAGE:-openpolicyagent/opa:1.14.0}
    command:
      - 'run'
      - '--server'
      - '--addr=0.0.0.0:8181'
      - '--log-level=error'
      - '--set=decision_logs.console=false'
    ports:
      - '8181:8181'
    healthcheck:
      test: ['CMD', '/opa', 'eval', 'true']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    profiles:
      - opa
      - full
      - full-dev
      - prod
    restart: unless-stopped

  # Photisnadi — Kanban task management with daily rituals (Flutter web).
  # Standalone profile (--profile photisnadi) pulls from GHCR.
  # full-dev builds from local ../photisnadi source.
  # sy-core proxy routes use PHOTISNADI_SUPABASE_URL/KEY from env_file.
  photisnadi:
    image: ghcr.io/maccracken/photisnadi:latest
    ports:
      - '8080:8080'
    environment:
      PORT: '8080'
      SUPABASE_URL: ${PHOTISNADI_SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${PHOTISNADI_SUPABASE_KEY:-}
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8080/api/v1/health']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    profiles:
      - photisnadi
    restart: unless-stopped

  # Photisnadi local build — uses sibling repo source for full integration dev.
  photisnadi-dev:
    build:
      context: ../photisnadi
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    environment:
      PORT: '8080'
      SUPABASE_URL: ${PHOTISNADI_SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${PHOTISNADI_SUPABASE_KEY:-}
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8080/api/v1/health']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    profiles:
      - full-dev
    restart: unless-stopped

  # BullShift — Algorithmic trading platform (Rust API).
  # Standalone profile (--profile bullshift) pulls from GHCR.
  # full-dev builds from local ../bullshift source.
  bullshift:
    image: ghcr.io/maccracken/bullshift:latest
    ports:
      - '${BULLSHIFT_PORT:-8787}:8787'
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      BULLSHIFT_PORT: '8787'
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:-}
      ALPACA_SANDBOX: '${ALPACA_SANDBOX:-true}'
    volumes:
      - bullshift-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8787/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - bullshift
    restart: unless-stopped

  # BullShift local build — uses sibling repo source for full integration dev.
  bullshift-dev:
    build:
      context: ../bullshift
      dockerfile: Dockerfile
    ports:
      - '${BULLSHIFT_PORT:-8787}:8787'
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      BULLSHIFT_PORT: '8787'
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET:-}
      ALPACA_SANDBOX: '${ALPACA_SANDBOX:-true}'
    volumes:
      - bullshift-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8787/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - full-dev
    restart: unless-stopped

  # Synapse — LLM controller for model pulling, inference, and training.
  # Standalone profile (--profile synapse) pulls from GHCR.
  # full-dev builds from local ../synapse source.
  # Provides REST (8420) and gRPC bridge (8421) for SY training delegation.
  synapse:
    image: ghcr.io/maccracken/synapse:latest
    ports:
      - '${SYNAPSE_REST_PORT:-8420}:8420'
      - '${SYNAPSE_GRPC_PORT:-8421}:8421'
    volumes:
      - synapse-models:/var/lib/synapse/models
      - synapse-data:/var/lib/synapse/data
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      SYNAPSE_STORAGE__MODELS_DIR: /var/lib/synapse/models
      SYNAPSE_STORAGE__DATABASE: /var/lib/synapse/data/synapse.db
      SY_ENDPOINT: 'http://sy-core:18789'
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8420/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    profiles:
      - synapse
      - full-dev
    restart: unless-stopped

  # Synapse local build — uses sibling repo source for full integration dev.
  synapse-dev:
    build:
      context: ../synapse
      dockerfile: docker/Dockerfile
    ports:
      - '${SYNAPSE_REST_PORT:-8420}:8420'
      - '${SYNAPSE_GRPC_PORT:-8421}:8421'
    volumes:
      - synapse-models:/var/lib/synapse/models
      - synapse-data:/var/lib/synapse/data
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      SYNAPSE_STORAGE__MODELS_DIR: /var/lib/synapse/models
      SYNAPSE_STORAGE__DATABASE: /var/lib/synapse/data/synapse.db
      SY_ENDPOINT: 'http://sy-core:18789'
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8420/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    profiles:
      - full-dev
    restart: unless-stopped

  # Delta — Code hosting, VCS, CI/CD, and artifact registry (Rust API).
  # Standalone profile (--profile delta) pulls from GHCR.
  # full-dev builds from local ../delta source.
  delta:
    image: ghcr.io/maccracken/delta:latest
    ports:
      - '${DELTA_PORT:-8070}:8070'
    volumes:
      - delta-data:/var/lib/delta
      - ./deploy/delta/config.toml:/etc/delta/config.toml:ro
    environment:
      RUST_LOG: ${RUST_LOG:-info}
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8070/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - delta
    restart: unless-stopped

  # Delta local build — uses sibling repo source for full integration dev.
  delta-dev:
    build:
      context: ../delta
      dockerfile: docker/Dockerfile
    ports:
      - '${DELTA_PORT:-8070}:8070'
    volumes:
      - delta-data:/var/lib/delta
      - ./deploy/delta/config.toml:/etc/delta/config.toml:ro
    environment:
      RUST_LOG: ${RUST_LOG:-info}
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8070/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - full-dev
    restart: unless-stopped

  # Aequi — Self-employed accounting platform (Rust + SQLite).
  # Standalone profile (--profile aequi) pulls from GHCR.
  # full-dev builds from local ../aequi source.
  # NOTE: Project still in development — Dockerfile and health endpoint TBD.
  aequi:
    image: ghcr.io/maccracken/aequi:latest
    ports:
      - '${AEQUI_PORT:-8060}:8060'
    volumes:
      - aequi-data:/var/lib/aequi/data
    environment:
      RUST_LOG: ${RUST_LOG:-info}
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8060/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - aequi
    restart: unless-stopped

  # Aequi local build — uses sibling repo source for full integration dev.
  aequi-dev:
    build:
      context: ../aequi
      dockerfile: Dockerfile
    ports:
      - '${AEQUI_PORT:-8060}:8060'
    volumes:
      - aequi-data:/var/lib/aequi/data
    environment:
      RUST_LOG: ${RUST_LOG:-info}
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8060/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - full-dev
    restart: unless-stopped

  # ── Shruti DAW ───────────────────────────────────────────────────────────────
  # Rust-native digital audio workstation with AI-assisted music production.
  # Port 8050. Headless server mode (no GUI).
  shruti:
    image: ghcr.io/maccracken/shruti:latest
    ports:
      - '${SHRUTI_PORT:-8050}:8050'
    volumes:
      - shruti-data:/data
    environment:
      SHRUTI_HOST: '0.0.0.0'
      SHRUTI_API_KEY: ${SHRUTI_API_KEY:-}
      SHRUTI_DATA_DIR: /data
      RUST_LOG: ${RUST_LOG:-info}
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8050/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - shruti
    restart: unless-stopped

  # Shruti local build — uses sibling repo source for full integration dev.
  shruti-dev:
    build:
      context: ../shruti
      dockerfile: Dockerfile
    ports:
      - '${SHRUTI_PORT:-8050}:8050'
    volumes:
      - shruti-data:/data
    environment:
      SHRUTI_HOST: '0.0.0.0'
      SHRUTI_API_KEY: ${SHRUTI_API_KEY:-}
      SHRUTI_DATA_DIR: /data
      RUST_LOG: ${RUST_LOG:-info}
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8050/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - full-dev
    restart: unless-stopped

  # ── Rasa Image Editor ────────────────────────────────────────────────────────
  # AI-native image editor with GPU-accelerated rendering and generative AI.
  # Port 8080. Headless API mode.
  rasa:
    image: ghcr.io/maccracken/rasa:latest
    ports:
      - '${RASA_PORT:-8080}:8080'
    volumes:
      - rasa-data:/var/lib/rasa/data
      - rasa-models:/var/lib/rasa/models
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      RASA_DATA_DIR: /var/lib/rasa/data
      RASA_MODEL_DIR: /var/lib/rasa/models
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8080/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - rasa
    restart: unless-stopped

  # Rasa local build — uses sibling repo source for full integration dev.
  rasa-dev:
    build:
      context: ../rasa
      dockerfile: docker/Dockerfile
    ports:
      - '${RASA_PORT:-8080}:8080'
    volumes:
      - rasa-data:/var/lib/rasa/data
      - rasa-models:/var/lib/rasa/models
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      RASA_DATA_DIR: /var/lib/rasa/data
      RASA_MODEL_DIR: /var/lib/rasa/models
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:8080/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - full-dev
    restart: unless-stopped

  # Dashboard is now served by the core gateway (SPA serving via @fastify/static).
  # The separate dashboard service below is for local development only.
  sy-dashboard-dev:
    # PRODUCTION: Pin to SHA256 digest in .env — e.g. NODE_IMAGE=node@sha256:<digest>
    # Get digest: docker manifest inspect node:22-alpine | jq -r '.manifests[0].digest'
    image: ${NODE_IMAGE:-node:22-alpine}
    working_dir: /app
    command: sh -c "npm install --ignore-scripts && npm run dev:dashboard"
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - node-modules:/app/node_modules
      - dashboard-node-modules:/app/packages/dashboard/node_modules
    env_file: .env.dev
    environment:
      # VITE_GATEWAY_URL set via env_file (.env.dev) — defaults to http, override to https when TLS enabled
      VITE_HOST: '0.0.0.0'
      CHOKIDAR_USEPOLLING: 'true'
      CHOKIDAR_INTERVAL: '300'
    depends_on:
      sy-core:
        condition: service_healthy
    profiles:
      - dev
      - full-dev

volumes:
  pgdata:
  sy-pgdata:
  data:
  community-repo:
  bullshift-data:
  synapse-models:
  synapse-data:
  aequi-data:
  shruti-data:
  rasa-data:
  rasa-models:
  delta-data:
  node-modules:
  dashboard-node-modules:

name: secureyeoman

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: secureyeoman
      POSTGRES_USER: secureyeoman
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secureyeoman_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secureyeoman"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  core:
    build:
      context: .
      dockerfile: Dockerfile.dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "18789:18789"
    volumes:
      - data:/home/secureyeoman/.secureyeoman
      - community-repo:/usr/share/secureyeoman/community-repo
      - ./certs:/app/certs:ro
    env_file: .env.dev
    environment:
      SECUREYEOMAN_HOST: "0.0.0.0"
      NODE_ENV: production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secureyeoman_dev}
      DATABASE_HOST: postgres
      DATABASE_USER: secureyeoman
      DATABASE_NAME: secureyeoman
      # OAuth credentials loaded from env_file (.env.dev) — do not re-declare here
      # as ${VAR:-} resolves against the host shell and overrides env_file values.
      # OPA sidecar for Rego policy evaluation (Phase 50).
      # Unset to disable OPA; core falls back to natural-language rule matching.
      OPA_ADDR: ${OPA_ADDR:-}
      # AGNOS integration — points to agnosticos service when --profile agnos is active.
      AGNOS_GATEWAY_URL: ${AGNOS_GATEWAY_URL:-http://agnosticos:8088}
      AGNOS_RUNTIME_URL: ${AGNOS_RUNTIME_URL:-http://agnosticos:8090}
      AGNOS_GATEWAY_API_KEY: ${AGNOS_GATEWAY_API_KEY:-}
      AGNOS_RUNTIME_API_KEY: ${AGNOS_RUNTIME_API_KEY:-}
      # AGNOSTIC QA integration — points to agnostic-webgui service when --profile agnostic is active.
      AGNOSTIC_URL: ${AGNOSTIC_URL:-http://agnostic-webgui:8000}
      AGNOSTIC_API_KEY: ${AGNOSTIC_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "NODE_TLS_REJECT_UNAUTHORIZED=0 node /app/packages/core/dist/cli.js health --url https://127.0.0.1:18789 --json 2>/dev/null || node /app/packages/core/dist/cli.js health --url http://127.0.0.1:18789 --json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # MCP service uses the 'mcp-server' subcommand of the core binary/node process
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ["mcp-server"]
    ports:
      - "3001:3001"
    volumes:
      - data:/home/secureyeoman/.secureyeoman
    env_file: .env.dev
    environment:
      MCP_ENABLED: "${MCP_ENABLED:-true}"
      MCP_PORT: "3001"
      MCP_HOST: "0.0.0.0"
      MCP_TRANSPORT: "${MCP_TRANSPORT:-streamable-http}"
      MCP_AUTO_REGISTER: "${MCP_AUTO_REGISTER:-true}"
      # MCP_CORE_URL set via env_file (.env.dev) — defaults to http, override to https when TLS enabled
      MCP_ADVERTISE_URL: "http://mcp:3001"
      MCP_EXPOSE_FILESYSTEM: "${MCP_EXPOSE_FILESYSTEM:-false}"
      MCP_ALLOWED_PATHS: "${MCP_ALLOWED_PATHS:-}"
      MCP_RATE_LIMIT_PER_TOOL: "${MCP_RATE_LIMIT_PER_TOOL:-30}"
      MCP_LOG_LEVEL: "${MCP_LOG_LEVEL:-info}"
      MCP_EXPOSE_AGNOS_TOOLS: "${MCP_EXPOSE_AGNOS_TOOLS:-false}"
      MCP_EXPOSE_AGNOSTIC_TOOLS: "${MCP_EXPOSE_AGNOSTIC_TOOLS:-false}"
      AGNOSTIC_URL: ${AGNOSTIC_URL:-http://agnostic-webgui:8000}
      AGNOSTIC_API_KEY: ${AGNOSTIC_API_KEY:-}
      AGNOS_GATEWAY_URL: ${AGNOS_GATEWAY_URL:-http://agnosticos:8088}
      AGNOS_RUNTIME_URL: ${AGNOS_RUNTIME_URL:-http://agnosticos:8090}
      AGNOS_GATEWAY_API_KEY: ${AGNOS_GATEWAY_API_KEY:-}
      AGNOS_RUNTIME_API_KEY: ${AGNOS_RUNTIME_API_KEY:-}
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      core:
        condition: service_healthy
    profiles:
      - mcp
      - full
      - full-dev
      - dev
    restart: unless-stopped

  # AGNOS (agnosticos) — AI-Native General Operating System.
  # Provides LLM Gateway (port 8088, OpenAI-compatible) and Agent Runtime (port 8090).
  agnosticos:
    image: ghcr.io/maccracken/agnosticos:alpha
    ports:
      - "8088:8088"
      - "8090:8090"
    environment:
      AGNOS_LOG_FORMAT: "${AGNOS_LOG_FORMAT:-json}"
      RUST_LOG: "${RUST_LOG:-info}"
      AGNOS_RUNTIME_BIND: "0.0.0.0"
      AGNOS_GATEWAY_BIND: "0.0.0.0"
      AGNOS_RUNTIME_API_KEY: "${AGNOS_RUNTIME_API_KEY:-}"
      AGNOS_GATEWAY_API_KEY: "${AGNOS_GATEWAY_API_KEY:-}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8088/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - agnos
      - full
      - full-dev
    restart: unless-stopped

  # AGNOSTIC QA Platform — webgui + backing services.
  # Provides QA task management, webhooks, and SSE event stream on port 8000.
  agnostic-redis:
    image: redis:7-alpine
    volumes:
      - agnostic-redis-data:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    profiles:
      - agnostic
      - full-dev
    restart: unless-stopped

  agnostic-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${AGNOSTIC_POSTGRES_DB:-agnostic}
      POSTGRES_USER: ${AGNOSTIC_POSTGRES_USER:-agnostic}
      POSTGRES_PASSWORD: ${AGNOSTIC_POSTGRES_PASSWORD:-agnostic_dev}
    volumes:
      - agnostic-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AGNOSTIC_POSTGRES_USER:-agnostic}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    profiles:
      - agnostic
      - full-dev
    restart: unless-stopped

  agnostic-webgui:
    image: ghcr.io/maccracken/agnostic-webgui:2026.3.8
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://agnostic-redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AGNOSTIC_API_KEY: ${AGNOSTIC_API_KEY:-}
      YEOMAN_A2A_ENABLED: "${YEOMAN_A2A_ENABLED:-true}"
      MCP_SERVER_ENABLED: "${MCP_SERVER_ENABLED:-true}"
      WEBGUI_HOST: "0.0.0.0"
      WEBGUI_PORT: "8000"
      DATABASE_URL: "postgresql+asyncpg://${AGNOSTIC_POSTGRES_USER:-agnostic}:${AGNOSTIC_POSTGRES_PASSWORD:-agnostic_dev}@agnostic-postgres:5432/${AGNOSTIC_POSTGRES_DB:-agnostic}"
      DATABASE_ENABLED: "${AGNOSTIC_DATABASE_ENABLED:-false}"
    depends_on:
      agnostic-redis:
        condition: service_started
      agnostic-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    profiles:
      - agnostic
      - full-dev
    restart: unless-stopped

  # OPA sidecar — used by IntentManager for Rego policy evaluation (Phase 50).
  # Capabilities are restricted to block SSRF: http.send and net.lookup_ip_addr
  # are disabled before accepting user-authored Rego policies.
  opa:
    image: openpolicyagent/opa:1.14.0
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=error"
      - "--set=decision_logs.console=false"
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "/opa", "eval", "true"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    profiles:
      - opa
      - full
      - full-dev
    restart: unless-stopped

  # Dashboard is now served by the core gateway (SPA serving via @fastify/static).
  # The separate dashboard service below is for local development only.
  dashboard-dev:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install --ignore-scripts && npm run dev:dashboard"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node-modules:/app/node_modules
      - dashboard-node-modules:/app/packages/dashboard/node_modules
    env_file: .env.dev
    environment:
      # VITE_GATEWAY_URL set via env_file (.env.dev) — defaults to http, override to https when TLS enabled
      VITE_HOST: "0.0.0.0"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    depends_on:
      core:
        condition: service_healthy
    profiles:
      - dev
      - full-dev

volumes:
  pgdata:
  data:
  community-repo:
  agnostic-redis-data:
  agnostic-pgdata:
  node-modules:
  dashboard-node-modules:

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:  # allow reuse as CI gate from release workflow

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - run: npm run typecheck

  test-unit:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - run: npm ci

      - name: Core unit tests
        run: npx vitest run --project core:unit
        env:
          NODE_ENV: test

      - name: Dashboard tests
        run: npx vitest run --project dashboard
        env:
          NODE_ENV: test

      - name: MCP tests
        run: npx vitest run --project mcp
        env:
          NODE_ENV: test

      - name: Upload coverage
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: packages/core/coverage/lcov.info
          retention-days: 7
          if-no-files-found: ignore

  test-integration:
    name: Integration & E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: secureyeoman
          POSTGRES_PASSWORD: secureyeoman_dev
          POSTGRES_DB: secureyeoman_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U secureyeoman"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - name: DB integration tests
        run: npx vitest run --project core:db
        env:
          NODE_ENV: test
          TEST_DB_HOST: localhost
          TEST_DB_PORT: "5432"
          TEST_DB_USER: secureyeoman
          TEST_DB_PASSWORD: secureyeoman_dev
          TEST_DB_NAME: secureyeoman_test

      - name: E2E tests
        run: npx vitest run --project core:e2e
        env:
          NODE_ENV: test
          TEST_DB_HOST: localhost
          TEST_DB_PORT: "5432"
          TEST_DB_USER: secureyeoman
          TEST_DB_PASSWORD: secureyeoman_dev
          TEST_DB_NAME: secureyeoman_test

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    # Advisory only — does not block the pipeline
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - run: npm audit --audit-level=moderate

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint deploy/helm/secureyeoman

      - name: Template dry-run
        run: helm template secureyeoman deploy/helm/secureyeoman -f deploy/helm/secureyeoman/values-production.yaml

  container-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    # Non-blocking — verifies the Dockerfile builds but does not push
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: docker build -f Dockerfile.dev -t secureyeoman:dev-test .

      - name: Sanity check (dev)
        run: |
          docker run --rm secureyeoman:dev-test node -e "console.log('dev-image-ok')" | grep dev-image-ok

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:  # allow reuse as CI gate from release workflow

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - run: npm run typecheck

  test-core:
    name: Core Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - run: npm ci

      - name: Core unit tests
        run: npx vitest run --project core:unit --reporter=default --reporter=github-actions
        env:
          NODE_ENV: test

      - name: Upload coverage
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-core-lcov
          path: packages/core/coverage/lcov.info
          retention-days: 7
          if-no-files-found: ignore

  test-dashboard:
    name: Dashboard Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - name: Dashboard tests
        run: npx vitest run --project dashboard --reporter=default --reporter=github-actions
        env:
          NODE_ENV: test

  test-mcp:
    name: MCP Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - name: MCP tests
        run: npx vitest run --project mcp --reporter=default --reporter=github-actions
        env:
          NODE_ENV: test

  test-db:
    name: DB Integration Tests (shard ${{ matrix.shard }}/8)
    needs: [test-core, test-dashboard, test-mcp]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
      fail-fast: false
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: secureyeoman
          POSTGRES_PASSWORD: secureyeoman_dev
          POSTGRES_DB: secureyeoman_test_${{ matrix.shard }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U secureyeoman"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - name: Enable pgvector extension
        run: PGPASSWORD=secureyeoman_dev psql -h localhost -U secureyeoman -d secureyeoman_test_${{ matrix.shard }} -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: DB integration tests (shard ${{ matrix.shard }}/8)
        run: npx vitest run --project core:db --shard=${{ matrix.shard }}/8 --reporter=default --reporter=github-actions
        env:
          NODE_ENV: test
          TEST_DB_HOST: localhost
          TEST_DB_PORT: "5432"
          TEST_DB_USER: secureyeoman
          TEST_DB_PASSWORD: secureyeoman_dev
          TEST_DB_NAME: secureyeoman_test_${{ matrix.shard }}
          SECUREYEOMAN_TOKEN_SECRET: ci-test-token-secret

  test-e2e:
    name: E2E Tests
    needs: [test-core, test-dashboard, test-mcp]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: secureyeoman
          POSTGRES_PASSWORD: secureyeoman_dev
          POSTGRES_DB: secureyeoman_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U secureyeoman"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - name: E2E tests
        run: npx vitest run --project core:e2e --reporter=default --reporter=github-actions
        env:
          NODE_ENV: test
          TEST_DB_HOST: localhost
          TEST_DB_PORT: "5432"
          TEST_DB_USER: secureyeoman
          TEST_DB_PASSWORD: secureyeoman_dev
          TEST_DB_NAME: secureyeoman_test
          SECUREYEOMAN_TOKEN_SECRET: ci-test-token-secret

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    # Advisory only — does not block the pipeline
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - run: npm ci

      - run: npm audit --audit-level=moderate

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint deploy/helm/secureyeoman

      - name: Template dry-run
        run: helm template secureyeoman deploy/helm/secureyeoman -f deploy/helm/secureyeoman/values-production.yaml

  test-edge:
    name: Edge Binary Tests (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cmd/secureyeoman-edge/go.mod
          cache-dependency-path: cmd/secureyeoman-edge/go.sum

      - name: Go unit + smoke tests
        run: go test -v -count=1 -timeout=120s ./...
        working-directory: cmd/secureyeoman-edge

      - name: Build static binary
        run: CGO_ENABLED=0 go build -ldflags "-s -w -X main.Version=ci-test" -o /tmp/secureyeoman-edge .
        working-directory: cmd/secureyeoman-edge

      - name: Binary smoke test
        run: |
          /tmp/secureyeoman-edge --version | grep ci-test
          /tmp/secureyeoman-edge status | grep "Node ID"
          timeout 3 /tmp/secureyeoman-edge start --port 18899 --log-level info 2>&1 || true

      - name: Cross-compile ARM64
        run: GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w" -o /dev/null .
        working-directory: cmd/secureyeoman-edge

  container-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    # Non-blocking — verifies the Dockerfile builds but does not push
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: docker build -f Dockerfile.dev -t secureyeoman:dev-test .

      - name: Sanity check (dev)
        run: |
          docker run --rm --entrypoint node secureyeoman:dev-test -e "console.log('dev-image-ok')" | grep dev-image-ok

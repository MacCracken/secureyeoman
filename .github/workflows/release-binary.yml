name: Release Binary

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].[0-9]*'   # e.g. 2026.3.8
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 2026.3.8). Creates tag + release.'
        required: true
        type: string
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: false
        type: boolean

permissions:
  contents: write       # creating GitHub releases and uploading assets
  id-token: write       # Sigstore OIDC token for keyless signing
  attestations: write   # SLSA provenance attestations
  packages: write       # push Docker images to GHCR

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: maccracken/secureyeoman

jobs:
  # Quality gate — run CI checks before building release
  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      actions: read

  build:
    name: Build binaries
    needs: ci-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: secureyeoman
          POSTGRES_PASSWORD: secureyeoman_dev
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U secureyeoman"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    outputs:
      version: ${{ steps.version.outputs.version }}
      date_tag: ${{ steps.version.outputs.date_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for release notes generation

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="${{ github.ref_name }}"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

          # CalVer → compact date tag: YYYY.M.D → YYYYMMDD, YYYY.M.D-N → YYYYMMDDN
          BASE="${VER%%-*}"
          PATCH=""
          [[ "$VER" == *-* ]] && PATCH="${VER##*-}"
          YEAR="${BASE%%.*}"
          REST="${BASE#*.}"
          MONTH="${REST%%.*}"
          DAY="${REST#*.}"
          DATE_TAG=$(printf '%s%02d%02d%s' "$YEAR" "$MONTH" "$DAY" "$PATCH")
          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"
          echo "==> Version: ${VER} → date tag: ${DATE_TAG}"

      - name: Create tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Go (for edge binary)
        uses: actions/setup-go@v5
        with:
          go-version-file: cmd/secureyeoman-edge/go.mod

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript + Dashboard
        run: npm run build

      - name: Compile binaries
        run: bash scripts/build-binary.sh
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: List artifacts
        run: ls -lh dist/secureyeoman-*

      - name: Smoke test (linux-x64 Tier 1 + Tier 2)
        env:
          SMOKE_PG_HOST: localhost
          SMOKE_PG_PORT: "5432"
          SMOKE_PG_USER: secureyeoman
          SMOKE_PG_PASSWORD: secureyeoman_dev
        run: bash scripts/smoke-test-binary.sh

      - name: Generate CycloneDX SBOM
        run: |
          node packages/core/dist/cli.js sbom generate --output dist/secureyeoman-sbom.cdx.json
          echo "==> SBOM generated"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign binaries with cosign (keyless)
        run: |
          DT="${{ steps.version.outputs.date_tag }}"
          for binary in \
            dist/secureyeoman-${DT}-linux-x64 \
            dist/secureyeoman-${DT}-linux-arm64 \
            dist/secureyeoman-${DT}-darwin-arm64 \
            dist/secureyeoman-${DT}-windows-x64.exe \
            dist/secureyeoman-${DT}-lite-linux-x64 \
            dist/secureyeoman-${DT}-lite-linux-arm64 \
            dist/secureyeoman-${DT}-lite-windows-x64.exe \
            dist/secureyeoman-${DT}-agent-linux-x64 \
            dist/secureyeoman-${DT}-agent-linux-arm64 \
            dist/secureyeoman-${DT}-agent-darwin-arm64 \
            dist/secureyeoman-${DT}-edge-linux-x64 \
            dist/secureyeoman-${DT}-edge-linux-arm64 \
            dist/secureyeoman-${DT}-edge-linux-armv7 \
            dist/secureyeoman-${DT}-edge-linux-riscv64; do
            if [ -f "$binary" ]; then
              cosign sign-blob --yes "$binary" --output-signature "${binary}.sig" --output-certificate "${binary}.cert"
              echo "==> Signed: $binary"
            fi
          done

      - name: Generate SLSA provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-linux-x64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-linux-arm64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-darwin-arm64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-windows-x64.exe
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-lite-linux-x64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-lite-linux-arm64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-lite-windows-x64.exe
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-agent-linux-x64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-agent-linux-arm64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-agent-darwin-arm64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-edge-linux-x64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-edge-linux-arm64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-edge-linux-armv7
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-edge-linux-riscv64

      - name: Upload Linux binaries + migrations (for container job)
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-linux-x64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-linux-arm64
            dist/migrations/
          retention-days: 1

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DT="${{ steps.version.outputs.date_tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"

          # ── Helper: compute human-readable file size ──
          file_size() {
            if [ -f "$1" ]; then
              local bytes
              bytes=$(stat --printf='%s' "$1" 2>/dev/null || stat -f '%z' "$1" 2>/dev/null || echo 0)
              if [ "$bytes" -ge 1073741824 ]; then
                printf '%.1f GB' "$(echo "scale=1; $bytes / 1073741824" | bc)"
              elif [ "$bytes" -ge 1048576 ]; then
                printf '%.1f MB' "$(echo "scale=1; $bytes / 1048576" | bc)"
              elif [ "$bytes" -ge 1024 ]; then
                printf '%.0f KB' "$(echo "scale=0; $bytes / 1024" | bc)"
              else
                printf '%d B' "$bytes"
              fi
            else
              echo "—"
            fi
          }

          # ── Extract structured changelog section from CHANGELOG.md ──
          CHANGELOG_SECTION=""
          if [ -f CHANGELOG.md ]; then
            # Grab everything between ## [VERSION] and the next ## [
            CHANGELOG_SECTION=$(sed -n "/^## \\[${VERSION}\\]/,/^## \\[/{/^## \\[${VERSION}\\]/d;/^## \\[/d;p;}" CHANGELOG.md | head -80)
          fi

          {
            echo "notes<<EOF"

            # ── Quick start ──
            echo "### Quick start"
            echo ""
            echo "**Linux x86_64 (full):**"
            echo "\`\`\`bash"
            echo "curl -fsSL ${REPO_URL}/releases/download/${VERSION}/secureyeoman-${DT}-linux-x64 -o secureyeoman"
            echo "chmod +x secureyeoman"
            echo "./secureyeoman --version"
            echo "\`\`\`"
            echo ""
            echo "**Docker:**"
            echo "\`\`\`bash"
            echo "docker pull ghcr.io/maccracken/secureyeoman:${VERSION}"
            echo "\`\`\`"
            echo ""

            # ── Which binary do I need? ──
            echo "### Which binary do I need?"
            echo ""
            echo "| If you want to... | Download | Database |"
            echo "|---|---|---|"
            echo "| Run the full platform (server, dashboard, all subsystems) | \`secureyeoman-${DT}-<platform>\` | PostgreSQL |"
            echo "| Try it out quickly, no external dependencies | \`secureyeoman-${DT}-lite-<platform>\` | SQLite (embedded) |"
            echo "| Run just the AI agent runtime (soul + A2A) | \`secureyeoman-${DT}-agent-<platform>\` | SQLite (embedded) |"
            echo "| Deploy a minimal agent on edge/IoT hardware | \`secureyeoman-${DT}-edge-<platform>\` | None (stateless) |"
            echo ""

            # ── Changelog ──
            echo "### What's changed"
            echo ""
            if [ -n "$CHANGELOG_SECTION" ]; then
              echo "$CHANGELOG_SECTION"
            elif [ -n "$PREV_TAG" ]; then
              git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" | head -50
            else
              git log --pretty=format:"- %s" -20
            fi
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo ""
              echo "**Full diff**: [\`${PREV_TAG}...${VERSION}\`](${REPO_URL}/compare/${PREV_TAG}...${VERSION}) | **Previous release**: [\`${PREV_TAG}\`](${REPO_URL}/releases/tag/${PREV_TAG})"
            fi
            echo ""

            # ── Binaries ──
            echo "<details>"
            echo "<summary><strong>All binaries</strong> (naming: <code>secureyeoman-YYYYMMDD-type-platform</code>)</summary>"
            echo ""
            echo "#### Tier 1 — Full (PostgreSQL)"
            echo ""
            echo "| Binary | Platform | Size |"
            echo "|--------|----------|------|"
            echo "| \`secureyeoman-${DT}-linux-x64\` | Linux x86_64 | $(file_size dist/secureyeoman-${DT}-linux-x64) |"
            echo "| \`secureyeoman-${DT}-linux-arm64\` | Linux ARM64 | $(file_size dist/secureyeoman-${DT}-linux-arm64) |"
            echo "| \`secureyeoman-${DT}-darwin-arm64\` | macOS ARM64 | $(file_size dist/secureyeoman-${DT}-darwin-arm64) |"
            echo "| \`secureyeoman-${DT}-windows-x64.exe\` | Windows x64 | $(file_size dist/secureyeoman-${DT}-windows-x64.exe) |"
            echo ""
            echo "#### Tier 2 — Lite (SQLite, no PostgreSQL required)"
            echo ""
            echo "| Binary | Platform | Size |"
            echo "|--------|----------|------|"
            echo "| \`secureyeoman-${DT}-lite-linux-x64\` | Linux x86_64 | $(file_size dist/secureyeoman-${DT}-lite-linux-x64) |"
            echo "| \`secureyeoman-${DT}-lite-linux-arm64\` | Linux ARM64 | $(file_size dist/secureyeoman-${DT}-lite-linux-arm64) |"
            echo "| \`secureyeoman-${DT}-lite-windows-x64.exe\` | Windows x64 | $(file_size dist/secureyeoman-${DT}-lite-windows-x64.exe) |"
            echo ""
            echo "#### Tier 2.5 — Agent (soul + AI runtime, SQLite)"
            echo ""
            echo "| Binary | Platform | Size |"
            echo "|--------|----------|------|"
            echo "| \`secureyeoman-${DT}-agent-linux-x64\` | Linux x86_64 | $(file_size dist/secureyeoman-${DT}-agent-linux-x64) |"
            echo "| \`secureyeoman-${DT}-agent-linux-arm64\` | Linux ARM64 | $(file_size dist/secureyeoman-${DT}-agent-linux-arm64) |"
            echo "| \`secureyeoman-${DT}-agent-darwin-arm64\` | macOS ARM64 | $(file_size dist/secureyeoman-${DT}-agent-darwin-arm64) |"
            echo ""
            echo "#### Tier 3 — Edge/IoT (minimal A2A, static Go binary)"
            echo ""
            echo "| Binary | Platform | Size |"
            echo "|--------|----------|------|"
            echo "| \`secureyeoman-${DT}-edge-linux-x64\` | Linux x86_64 | $(file_size dist/secureyeoman-${DT}-edge-linux-x64) |"
            echo "| \`secureyeoman-${DT}-edge-linux-arm64\` | Linux ARM64 (RPi 4, etc.) | $(file_size dist/secureyeoman-${DT}-edge-linux-arm64) |"
            echo "| \`secureyeoman-${DT}-edge-linux-armv7\` | Linux ARMv7 (older ARM) | $(file_size dist/secureyeoman-${DT}-edge-linux-armv7) |"
            echo "| \`secureyeoman-${DT}-edge-linux-riscv64\` | Linux RISC-V 64 | $(file_size dist/secureyeoman-${DT}-edge-linux-riscv64) |"
            echo ""
            echo "</details>"
            echo ""

            # ── Docker ──
            echo "<details>"
            echo "<summary><strong>Docker</strong></summary>"
            echo ""
            echo "\`\`\`bash"
            echo "docker pull ghcr.io/maccracken/secureyeoman:${VERSION}"
            echo "\`\`\`"
            echo ""
            echo "Multi-arch image (linux/amd64, linux/arm64) pushed to \`ghcr.io/maccracken/secureyeoman\`."
            echo ""
            echo "</details>"
            echo ""

            # ── Supply chain ──
            echo "<details>"
            echo "<summary><strong>Verification & supply chain</strong></summary>"
            echo ""
            echo "Every binary and container image is signed with [Sigstore cosign](https://www.sigstore.dev/) (keyless OIDC) and includes [SLSA](https://slsa.dev/) provenance attestations. A CycloneDX SBOM (\`secureyeoman-sbom.cdx.json\`) is attached to each release."
            echo ""
            echo "\`\`\`bash"
            echo "# Verify binary signature"
            echo "cosign verify-blob \\"
            echo "  --certificate secureyeoman-${DT}-linux-x64.cert \\"
            echo "  --signature secureyeoman-${DT}-linux-x64.sig \\"
            echo "  secureyeoman-${DT}-linux-x64"
            echo ""
            echo "# Verify container image"
            echo "cosign verify ghcr.io/maccracken/secureyeoman:${VERSION} \\"
            echo "  --certificate-identity-regexp='github.com/MacCracken/secureyeoman' \\"
            echo "  --certificate-oidc-issuer='https://token.actions.githubusercontent.com'"
            echo ""
            echo "# Verify checksums"
            echo "sha256sum -c SHA256SUMS"
            echo "\`\`\`"
            echo ""
            echo "</details>"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: SecureYeoman ${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          prerelease: ${{ github.event.inputs.prerelease || false }}
          files: |
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-linux-x64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-linux-arm64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-darwin-arm64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-windows-x64.exe
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-lite-linux-x64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-lite-linux-arm64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-lite-windows-x64.exe
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-agent-linux-x64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-agent-linux-arm64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-agent-darwin-arm64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-edge-linux-x64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-edge-linux-arm64
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-edge-linux-armv7
            dist/secureyeoman-${{ steps.version.outputs.date_tag }}-edge-linux-riscv64
            dist/SHA256SUMS
            dist/secureyeoman-sbom.cdx.json
            dist/*.sig
            dist/*.cert
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Multi-arch Docker image build & push to GHCR ──────────────────────────
  container:
    name: Docker (${{ matrix.arch }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux-x64
          - arch: arm64
            platform: linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: artifact

      - name: Prepare build context
        run: |
          mkdir -p binaries/migrations
          cp "artifact/secureyeoman-${{ needs.build.outputs.date_tag }}-${{ matrix.platform }}" binaries/secureyeoman
          cp -r artifact/migrations/* binaries/migrations/
          chmod +x binaries/secureyeoman
          ls -lh binaries/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for arm64 emulation)
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (${{ matrix.arch }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.release
          platforms: linux/${{ matrix.arch }}
          push: true
          build-args: |
            TARGETARCH=${{ matrix.arch }}
            VERSION=${{ needs.build.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.version=${{ needs.build.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

  # ── Create multi-arch manifest and sign ────────────────────────────────────
  manifest:
    name: Multi-arch manifest
    needs: [build, container]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create multi-arch manifests
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          for TAG in "${VERSION}" "latest"; do
            docker buildx imagetools create \
              --tag "${IMAGE}:${TAG}" \
              "${IMAGE}:${VERSION}-amd64" \
              "${IMAGE}:${VERSION}-arm64"
            echo "==> Created manifest: ${IMAGE}:${TAG}"
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image (keyless)
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          # Sign the versioned tag (covers both arches via manifest)
          cosign sign --yes "${IMAGE}:${VERSION}"
          echo "==> Signed: ${IMAGE}:${VERSION}"

syntax = "proto3";

package synapse.bridge;

// ── SynapseBridge ─────────────────────────────────────────────────────────────
// Matches Synapse's bridge.proto — SY calls these RPCs on Synapse.
service SynapseBridge {
  rpc SubmitTrainingJob(TrainingJobRequest) returns (TrainingJobResponse);
  rpc GetJobStatus(JobStatusRequest) returns (stream JobStatusUpdate);
  rpc PullModel(PullModelRequest) returns (stream PullProgress);
  rpc RunInference(InferenceRequest) returns (InferenceResponse);
  rpc StreamInference(InferenceRequest) returns (stream StreamChunk);
}

// Matches Synapse's bridge.proto — Synapse calls these RPCs on SY.
service YeomanBridge {
  rpc RequestGpuAllocation(GpuRequest) returns (GpuAllocation);
  rpc ReportProgress(stream ProgressUpdate) returns (Ack);
  rpc RequestScaleOut(ScaleRequest) returns (ScaleResponse);
  rpc RegisterCompletedModel(ModelRegistration) returns (Ack);
}

// ── Messages ──────────────────────────────────────────────────────────────────

message TrainingJobRequest {
  string base_model = 1;
  string dataset_path = 2;
  string method = 3;
  string config_json = 4;
}
message TrainingJobResponse {
  string job_id = 1;
}

message JobStatusRequest {
  string job_id = 1;
}
message JobStatusUpdate {
  string status = 1;
  uint64 step = 2;
  double loss = 3;
  float epoch = 4;
}

message PullModelRequest {
  string model_name = 1;
  string quant = 2;
}
message PullProgress {
  uint64 downloaded_bytes = 1;
  uint64 total_bytes = 2;
  string state = 3;
}

message InferenceRequest {
  string model = 1;
  string prompt = 2;
  uint32 max_tokens = 3;
}
message InferenceResponse {
  string text = 1;
}
message StreamChunk {
  string text = 1;
  bool done = 2;
}

message GpuRequest {
  uint64 memory_mb = 1;
  uint32 gpu_count = 2;
}
message GpuAllocation {
  repeated uint32 device_ids = 1;
  bool granted = 2;
}

message ProgressUpdate {
  string job_id = 1;
  string status = 2;
  double loss = 3;
  uint64 step = 4;
}
message Ack {}

message ScaleRequest {
  uint32 additional_instances = 1;
  string reason = 2;
}
message ScaleResponse {
  bool approved = 1;
  repeated string instance_endpoints = 2;
}

message ModelRegistration {
  string model_name = 1;
  string model_path = 2;
  string base_model = 3;
  string training_method = 4;
}

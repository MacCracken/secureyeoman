[package]
name = "secureyeoman-desktop"
version = "2026.2.28"
description = "SecureYeoman desktop app"
authors = ["SecureYeoman Project Contributors"]
edition = "2021"

[lib]
name = "secureyeoman_desktop_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = 3
lto = true
strip = true
